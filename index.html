<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VALORANT CASINO • SPIKE ROYALE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto+Mono:wght@400;700&display=swap');

    :root {
      --valorant-red: #c8102e;
      --valorant-cyan: #00f0ff;
    }

    body {
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      color: #ddd;
      font-family: 'Roboto Mono', monospace;
      overflow: hidden;
      height: 100vh;
      display: flex;
    }

    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #111;
      padding: 16px 30px;
      border-bottom: 4px solid var(--valorant-red);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .header h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: 2.1rem;
      letter-spacing: 4px;
      color: white;
      text-shadow: 0 0 15px var(--valorant-red);
      animation: titleAgent 3s infinite alternate;
    }

    @keyframes titleAgent {
      from { text-shadow: 0 0 10px var(--valorant-red); }
      to { text-shadow: 0 0 25px var(--valorant-red), 0 0 40px var(--valorant-cyan); }
    }

    .balance {
      background: #1a1a1a;
      padding: 10px 25px;
      border: 3px solid var(--valorant-red);
      font-size: 1.4rem;
      box-shadow: 0 0 20px rgba(200,16,46,0.5);
      transition: all 0.4s;
    }

    .balance.glow { animation: buyPhase 1.2s ease; }

    .main {
      flex: 1;
      padding: 100px 40px 40px;
      overflow-y: auto;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 30px;
    }

    .game-card {
      background: #181818;
      border: 3px solid #444;
      padding: 35px 25px;
      text-align: center;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative;
    }

    .game-card:hover {
      border-color: var(--valorant-red);
      transform: scale(1.06) rotate(1deg);
      box-shadow: 0 0 40px rgba(200,16,46,0.6);
    }

    .game-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent, rgba(200,16,46,0.08));
      opacity: 0;
      transition: opacity 0.4s;
    }

    .game-card:hover::before { opacity: 1; }

    /* MODAL COM ANIMAÇÃO SPIKE PLANT */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,10,10,0.98);
      z-index: 3000;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      width: 90%;
      max-width: 840px;
      background: #181818;
      border: 5px solid var(--valorant-red);
      padding: 40px;
      transform: scale(0.6) translateY(100px);
      opacity: 0;
      animation: spikePlant 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes spikePlant {
      to { transform: scale(1) translateY(0); opacity: 1; }
    }

    .close-btn {
      float: right;
      font-size: 3rem;
      color: #666;
      cursor: pointer;
      transition: 0.3s;
    }

    .close-btn:hover {
      color: var(--valorant-red);
      transform: rotate(90deg);
    }

    button {
      background: var(--valorant-red);
      color: white;
      border: none;
      padding: 18px 40px;
      font-family: 'Press Start 2P', cursive;
      font-size: 1.15rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px var(--valorant-red);
    }

    button:active {
      transform: scale(0.92);
      box-shadow: 0 0 40px var(--valorant-cyan);
    }

    /* RESULTADOS VALORANT STYLE */
    .result {
      margin: 30px 0;
      font-size: 1.8rem;
      min-height: 110px;
      text-align: center;
      opacity: 0;
      transform: translateY(40px);
    }

    .result.show {
      animation: aceAnimation 0.8s forwards;
    }

    @keyframes aceAnimation {
      0% { opacity: 0; transform: translateY(40px) scale(0.8); }
      50% { transform: scale(1.15); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .win { 
      color: #4ade80; 
      text-shadow: 0 0 20px #4ade80;
      animation: headshotFlash 1.2s infinite alternate;
    }

    .loss {
      color: #f87171;
      animation: whiffShake 0.6s;
    }

    @keyframes headshotFlash {
      from { text-shadow: 0 0 15px #4ade80; }
      to { text-shadow: 0 0 35px #4ade80, 0 0 60px #00f0ff; }
    }

    @keyframes whiffShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-12px); }
      75% { transform: translateX(12px); }
    }

    /* CHAT KILLFEED STYLE */
    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      padding: 10px 16px;
      border-left: 4px solid var(--valorant-red);
      background: #1f1f1f;
      opacity: 0;
      transform: translateX(-50px);
      animation: killfeedIn 0.5s forwards;
    }

    .message.you {
      border-left-color: var(--valorant-cyan);
      background: rgba(0, 240, 255, 0.1);
    }

    @keyframes killfeedIn {
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>VALORANT CASINO</h1>
    <div class="balance" id="balance">SALDO: <span id="saldo">14200</span> VP</div>
  </div>

  <div class="main">
    <div class="games-grid">
      <div class="game-card" onclick="openGame(1)"><h2>ROLETA DO SPIKE</h2><p>Plant ou Explode</p></div>
      <div class="game-card" onclick="openGame(2)"><h2>BLACKJACK AGENTES</h2><p>Jett vs Reyna</p></div>
      <div class="game-card" onclick="openGame(3)"><h2>CAÇA-NÍQUEL RADIANT</h2><p>Alinhe os agentes</p></div>
      <div class="game-card" onclick="openGame(4)"><h2>DUEL DE RANKS</h2><p>1v1 contra amigo</p></div>
    </div>

    <div style="margin-top:70px; background:#181818; border:3px solid #333; padding:25px;">
      <h2 style="color:var(--valorant-red); margin-top:0;">HISTÓRICO DE APOSTAS</h2>
      <table style="width:100%; border-collapse:collapse;">
        <thead><tr style="background:#222;"><th style="padding:12px;">Hora</th><th>Jogador</th><th>Jogo</th><th>Resultado</th><th>VP</th></tr></thead>
        <tbody id="history-body"></tbody>
      </table>
      <button onclick="exportLogs()" style="margin-top:20px;">EXPORTAR LOGS.TXT</button>
    </div>
  </div>

  <!-- CHAT KILLFEED -->
  <div style="width:360px; background:#111; border-left:4px solid var(--valorant-red); display:flex; flex-direction:column;">
    <div style="background:#1a1a1a; padding:16px; text-align:center; font-size:1.2rem; border-bottom:3px solid var(--valorant-red);">KILLFEED DA CREW</div>
    <div class="chat-messages" id="chat-messages"></div>
    <div style="padding:16px; background:#111;">
      <input id="chat-input" style="width:100%; padding:14px; background:#222; border:2px solid #444; color:white;" placeholder="Digite aqui...">
      <button onclick="sendMessage()" style="width:100%; margin-top:8px;">ENVIAR</button>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal()">×</span>
      <div id="game-body"></div>
    </div>
  </div>

  <script>
    let saldo = 14200;
    let historico = [];
    let mensagens = [];

    function saveData() {
      localStorage.setItem('vc_saldo', saldo);
      localStorage.setItem('vc_historico', JSON.stringify(historico));
      localStorage.setItem('vc_mensagens', JSON.stringify(mensagens));
    }

    function loadData() {
      if (localStorage.getItem('vc_saldo')) saldo = parseInt(localStorage.getItem('vc_saldo'));
      if (localStorage.getItem('vc_historico')) historico = JSON.parse(localStorage.getItem('vc_historico'));
      if (localStorage.getItem('vc_mensagens')) mensagens = JSON.parse(localStorage.getItem('vc_mensagens'));
    }

    function animateSaldo(target) {
      const el = document.getElementById('saldo');
      let current = parseInt(el.textContent.replace(/\./g,'')) || 0;
      const step = (target - current) / 25;
      let count = 0;
      const timer = setInterval(() => {
        current += step;
        count++;
        el.textContent = Math.floor(current).toLocaleString('pt-BR');
        if (count >= 25) {
          clearInterval(timer);
          el.textContent = target.toLocaleString('pt-BR');
          document.getElementById('balance').classList.add('glow');
          setTimeout(() => document.getElementById('balance').classList.remove('glow'), 1200);
        }
      }, 30);
    }

    function atualizarSaldo() {
      animateSaldo(saldo);
      saveData();
    }

    function addToHistory(jogador, jogo, resultado, vp) {
      const hora = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
      historico.unshift({hora, jogador, jogo, resultado, vp});
      if (historico.length > 30) historico.pop();
      renderHistory();
      saveData();
    }

    function renderHistory() {
      const tbody = document.getElementById('history-body');
      tbody.innerHTML = '';
      historico.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${item.hora}</td>
          <td>${item.jogador}</td>
          <td>${item.jogo}</td>
          <td class="${item.resultado === 'Vitória' ? 'win' : 'loss'}">${item.resultado}</td>
          <td style="text-align:right; color:${item.vp > 0 ? '#4ade80' : '#f87171'}">${item.vp > 0 ? '+' : ''}${item.vp} VP</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function addMessage(nome, texto, isYou = false) {
      mensagens.push({nome, texto, isYou, time: new Date().toLocaleTimeString('pt-BR',{hour:'2-digit', minute:'2-digit'})});
      if (mensagens.length > 35) mensagens.shift();
      renderChat();
      saveData();
    }

    function renderChat() {
      const chat = document.getElementById('chat-messages');
      chat.innerHTML = '';
      mensagens.forEach(m => {
        const div = document.createElement('div');
        div.className = `message ${m.isYou ? 'you' : ''}`;
        div.innerHTML = `<small>[${m.time}] </small><strong>${m.nome}:</strong> ${m.texto}`;
        chat.appendChild(div);
      });
      chat.scrollTop = chat.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById('chat-input');
      const txt = input.value.trim();
      if (!txt) return;
      addMessage("Você", txt, true);
      input.value = '';

      setTimeout(() => {
        const amigos = ["JettGod", "PhoenixMain", "SovaOneTap", "ReynaCarry"];
        const resp = ["Headshot!", "Boa!", "kkkkkk", "Radiant diff", "Alguém quer mais uma?"];
        addMessage(amigos[Math.floor(Math.random()*amigos.length)], resp[Math.floor(Math.random()*resp.length)]);
      }, 800);
    }

    function openGame(id) {
      document.getElementById('modal').style.display = 'flex';
      const body = document.getElementById('game-body');

      if (id === 1) body.innerHTML = `
        <h2 style="text-align:center;color:#c8102e;">ROLETA DO SPIKE</h2>
        <div style="text-align:center;margin:50px 0;">
          <button onclick="jogarRoleta()">PLANTAR SPIKE - 800 VP</button>
        </div>
        <div id="result1" class="result"></div>
      `;

      if (id === 2) body.innerHTML = `
        <h2 style="text-align:center;color:#c8102e;">BLACKJACK AGENTES</h2>
        <div style="text-align:center;margin:50px 0;">
          <button onclick="blackjack()">INICIAR MÃO - 500 VP</button>
        </div>
        <div id="result2" class="result"></div>
      `;

      if (id === 3) body.innerHTML = `
        <h2 style="text-align:center;color:#c8102e;">CAÇA-NÍQUEL RADIANT</h2>
        <div id="slots" style="font-size:3rem;letter-spacing:15px;text-align:center;margin:40px 0;">JETT • PHOENIX • SAGE</div>
        <div style="text-align:center;">
          <button onclick="cacaNiquel()">GIRAR ULT - 300 VP</button>
        </div>
        <div id="result3" class="result"></div>
      `;

      if (id === 4) body.innerHTML = `
        <h2 style="text-align:center;color:#c8102e;">DUEL DE RANKS</h2>
        <div style="text-align:center;margin:50px 0;">
          <button onclick="duelRank()">1v1 - 1200 VP</button>
        </div>
        <div id="result4" class="result"></div>
      `;
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    // ====================== JOGOS COM ANIMAÇÕES VALORANT ======================
    function jogarRoleta() {
      if (saldo < 800) return alert("Sem VP, vai farmar ranked");
      saldo -= 800;
      atualizarSaldo();
      const res = document.getElementById('result1');
      res.innerHTML = `<span style="color:#888;">PLANTANDO SPIKE...</span>`;

      setTimeout(() => {
        if (Math.random() > 0.4) {
          saldo += 2600;
          res.innerHTML = `<span class="win">💥 SPIKE EXPLODIU!<br>+2600 VP</span>`;
          addToHistory("Você", "Roleta do Spike", "Vitória", 2600);
        } else {
          res.innerHTML = `<span class="loss">🛡️ DESARMADO...</span>`;
          addToHistory("Você", "Roleta do Spike", "Derrota", -800);
        }
        atualizarSaldo();
      }, 1600);
    }

    function blackjack() {
      if (saldo < 500) return alert("Saldo insuficiente");
      saldo -= 500;
      atualizarSaldo();
      const res = document.getElementById('result2');
      res.innerHTML = `<span style="color:#888;">DANDO CARTAS...</span>`;

      setTimeout(() => {
        if (Math.random() > 0.47) {
          saldo += 1550;
          res.innerHTML = `<span class="win">ACE! +1550 VP</span>`;
          addToHistory("Você", "Blackjack", "Vitória", 1550);
        } else {
          res.innerHTML = `<span class="loss">WHIFF...</span>`;
          addToHistory("Você", "Blackjack", "Derrota", -500);
        }
        atualizarSaldo();
      }, 1300);
    }

    function cacaNiquel() {
      if (saldo < 300) return alert("Sem VP");
      saldo -= 300;
      atualizarSaldo();
      const agentes = ["JETT","PHOENIX","SAGE","RAZE","REYNA","OMEN"];
      const s1 = agentes[Math.floor(Math.random()*agentes.length)];
      const s2 = agentes[Math.floor(Math.random()*agentes.length)];
      const s3 = agentes[Math.floor(Math.random()*agentes.length)];
      document.getElementById('slots').textContent = `${s1} • ${s2} • ${s3}`;

      setTimeout(() => {
        const res = document.getElementById('result3');
        if (s1 === s2 && s2 === s3) {
          saldo += 7200;
          res.innerHTML = `<span class="win" style="font-size:2rem;">ULTIMATE JACKPOT!<br>+7200 VP</span>`;
          addToHistory("Você", "Caça-Níquel", "Vitória", 7200);
        } else if (s1 === s2 || s2 === s3) {
          saldo += 950;
          res.innerHTML = `<span class="win">+950 VP</span>`;
          addToHistory("Você", "Caça-Níquel", "Vitória", 950);
        } else {
          res.innerHTML = `<span class="loss">MISS...</span>`;
          addToHistory("Você", "Caça-Níquel", "Derrota", -300);
        }
        atualizarSaldo();
      }, 800);
    }

    function duelRank() {
      if (saldo < 1200) return alert("Saldo insuficiente");
      saldo -= 1200;
      atualizarSaldo();
      const res = document.getElementById('result4');
      res.innerHTML = `<span style="color:#888;">INICIANDO 1v1...</span>`;

      setTimeout(() => {
        if (Math.random() > 0.48) {
          saldo += 3400;
          res.innerHTML = `<span class="win">CLUTCH! +3400 VP</span>`;
          addToHistory("Você", "Duel de Ranks", "Vitória", 3400);
        } else {
          res.innerHTML = `<span class="loss">ELIMINADO...</span>`;
          addToHistory("Você", "Duel de Ranks", "Derrota", -1200);
        }
        atualizarSaldo();
      }, 1500);
    }

    function exportLogs() {
      let content = "VALORANT CASINO - LOGS\n";
      content += `Data: ${new Date().toLocaleString('pt-BR')}\nSaldo: ${saldo} VP\n\n`;
      historico.forEach(h => {
        content += `[${h.hora}] ${h.jogador} | ${h.jogo} | ${h.resultado} | ${h.vp > 0 ? '+' : ''}${h.vp} VP\n`;
      });
      const blob = new Blob([content], {type: 'text/plain'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'valorant-casino-logs.txt';
      a.click();
    }

    // INIT
    loadData();
    atualizarSaldo();
    renderHistory();
    renderChat();

    if (mensagens.length === 0) {
      setTimeout(() => addMessage("JettGod", "Vamos farmar VP hoje?"), 800);
      setTimeout(() => addMessage("SovaOneTap", "Eu to com 15k, quem topa?"), 1800);
    }

    document.getElementById('chat-input').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
